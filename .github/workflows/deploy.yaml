name: Deploy to Azure

on:
  push:
    branches: [ "main" ] # Спрацьовує при пуші в main

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Job 1: Terraform - provisioning інфраструктури
  # Потрібні secrets: AZURE_CREDENTIALS, ACR_NAME, POSTGRES_PASSWORD
  # ──────────────────────────────────────────────────────────────────
  provision-infrastructure:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Витягуємо ARM_* змінні з JSON-секрету AZURE_CREDENTIALS
      - name: Export ARM credentials for Terraform
        run: |
          echo "ARM_CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientId)" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientSecret)" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .subscriptionId)" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .tenantId)" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure/terraform
        run: terraform validate

# додаємо в tfstate ресурсну групу створену раніше скриптом 
      - name: Terraform Import
        working-directory: infrastructure/terraform
        run: |
          # 1. Імпорт групи ресурсів
          # terraform import -input=false \
          #   -var="acr_name=distributedacr${{ env.UNIQUE_SUFFIX }}" \
          #   -var="postgres_admin_password=${{ secrets.POSTGRES_PASSWORD }}" \
          #   azurerm_resource_group.main /subscriptions/${{ env.ARM_SUBSCRIPTION_ID }}/resourceGroups/DistributedSystem-RG || true

          # 2. Імпорт Azure Container Registry 
          # terraform import -input=false \
          #   -var="acr_name=dvolynetscmsregistry" \
          #   -var="postgres_admin_password=${{ secrets.POSTGRES_PASSWORD }}" \
          #   azurerm_container_registry.main /subscriptions/689bd508-a82a-474a-98ef-d17cee981c16/resourceGroups/DistributedSystem-RG/providers/Microsoft.ContainerRegistry/registries/dvolynetscmsregistry || true

          # 3. Імпорт Managed Environment
          # terraform import -input=false \
          #   -var="acr_name=distributedacr${{ env.UNIQUE_SUFFIX }}" \
          #   -var="postgres_admin_password=${{ secrets.POSTGRES_PASSWORD }}" \
          #   azurerm_container_app_environment.main /subscriptions/${{ env.ARM_SUBSCRIPTION_ID }}/resourceGroups/DistributedSystem-RG/providers/Microsoft.App/managedEnvironments/cms-env || true
          
           # end import

      - name: Terraform Apply
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_acr_name: ${{ secrets.ACR_NAME }}
          TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_PASSWORD }}

  # ──────────────────────────────────────────────────────────────────
  # Job 2: Docker build + push + update Container Apps
  # ──────────────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: provision-infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # Збираємо образи на GitHub Runner і пушимо в ACR
      - name: Build and Push Images
        run: |
          docker build \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/cms-service:${{ github.sha }} \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/cms-service:latest \
            -f src/CMS.Service/Dockerfile .

          docker build \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/gateway:${{ github.sha }} \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/gateway:latest \
            -f src/Gateway.Yarp/Dockerfile .

          docker push ${{ secrets.ACR_NAME }}.azurecr.io/cms-service:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/cms-service:latest
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/gateway:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/gateway:latest

      # Оновлюємо Container Apps новими образами (SHA-тег для точного відтворення)
      - name: Update Container Apps
        run: |
          az containerapp update \
            --name cms-service \
            --resource-group DistributedSystem-RG \
            --container-name cms-service \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/cms-service:${{ github.sha }}
          az containerapp update \
            --name gateway \
            --resource-group DistributedSystem-RG \
            --container-name gateway \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/gateway:${{ github.sha }}

      - name: Print App URL
        run: |
          URL=$(az containerapp show \
            --name gateway \
            --resource-group DistributedSystem-RG \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Deployed: https://$URL"
